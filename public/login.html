<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M3Uify — Sign in</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0d0d;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #e6e6e6;
        }

        .card {
            width: 100%;
            max-width: 360px;
            padding: 40px 36px;
            background: #141414;
            border: 1px solid #262626;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #c8f000 0%, #8ab800 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            border-radius: 3px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        h2 {
            font-size: 11px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1.8px;
            margin-bottom: 22px;
        }

        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            background: #1c1c1c;
            border: 1px solid #262626;
            color: #e6e6e6;
            font-size: 14px;
            outline: none;
            margin-bottom: 14px;
            border-radius: 0;
            transition: border-color 0.15s;
        }

        input[type="password"]:focus {
            border-color: #c8f000;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #888;
            cursor: pointer;
            user-select: none;
        }

        .remember input[type="checkbox"] {
            accent-color: #c8f000;
            cursor: pointer;
            width: 14px;
            height: 14px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 10px;
            background: #c8f000;
            color: #0d1000;
            border: none;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.4px;
            cursor: pointer;
            border-radius: 0;
            transition: background 0.15s, box-shadow 0.15s;
        }

        button[type="submit"]:hover {
            background: #d8f830;
            box-shadow: 0 0 0 1px #c8f000, 0 0 16px rgba(200, 240, 0, .22);
        }

        button[type="submit"]:disabled {
            opacity: 0.5;
            cursor: default;
            box-shadow: none;
        }

        .error {
            margin-top: 14px;
            padding: 10px 12px;
            background: rgba(240, 80, 106, .10);
            border: 1px solid rgba(240, 80, 106, .30);
            color: #f0506a;
            font-size: 13px;
            display: none;
        }

        .error.show {
            display: block;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">📺</div>
            <span class="logo-text">M3Uify</span>
        </div>
        <h2>Sign in</h2>
        <form id="form">
            <input type="password" id="pw" placeholder="Password" autofocus autocomplete="current-password" />
            <label class="remember">
                <input type="checkbox" id="remember" />
                <span>Remember me for 30 days</span>
            </label>
            <button type="submit" id="btn">Sign in</button>
            <div class="error" id="err"></div>
        </form>
    </div>

    <script>
        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pw = document.getElementById('pw').value;
            const rem = document.getElementById('remember').checked;
            const btn = document.getElementById('btn');
            const err = document.getElementById('err');
            err.className = 'error';
            btn.disabled = true;
            btn.textContent = 'Signing in…';
            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pw, remember: rem }),
                });
                const data = await res.json();
                if (!res.ok) {
                    err.textContent = data.error || 'Login failed';
                    err.className = 'error show';
                    btn.disabled = false;
                    btn.textContent = 'Sign in';
                    return;
                }
                window.location.href = '/';
            } catch {
                err.textContent = 'Network error — check your connection';
                err.className = 'error show';
                btn.disabled = false;
                btn.textContent = 'Sign in';
            }
        });
    </script>
</body>

</html>
