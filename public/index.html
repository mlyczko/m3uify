<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M3Uify</title>
    <link rel="stylesheet" href="style.css" />
    <!-- apply saved theme before first paint to prevent flash -->
    <script>(function () { var t = localStorage.getItem('m3uify_theme'); if (t === 'light') document.documentElement.setAttribute('data-theme', 'light'); })()</script>
</head>

<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="logo">
                <div class="logo-icon">📺</div>
                <span class="logo-text">M3Uify</span>
                <span id="app-version"></span>
            </div>

            <section class="sidebar-section">
                <h3>Playlist URL</h3>
                <div id="playlist-url-box">
                    <span id="playlist-url-text">Loading...</span>
                    <button id="copy-url-btn" title="Copy URL">⎘</button>
                </div>
                <small>Use this URL in your IPTV player</small>
                <button id="regen-token-btn" class="btn-secondary">Generate New Token</button>
            </section>

            <section class="sidebar-section">
                <h3>Source M3U</h3>
                <input type="text" id="source-url-input" placeholder="http://..." />
                <button id="fetch-source-btn" class="btn-primary">Fetch & Set Source</button> <button
                    id="clear-playlist-btn" class="btn-danger">✕ Clear Playlist</button>
            </section>

            <section class="sidebar-section">
                <h3>Sync</h3>
                <div id="last-sync-info">Last sync: —</div>
                <button id="sync-now-btn" class="btn-secondary">Sync Now</button>

                <div class="cron-builder">
                    <label class="cron-label">Auto-sync schedule</label>
                    <input type="text" id="cron-input" placeholder="0 4 * * *" spellcheck="false" />
                    <div class="cron-presets">
                        <button class="cron-preset" data-expr="0 4 * * *">Daily 4AM</button>
                        <button class="cron-preset" data-expr="0 */6 * * *">Every 6h</button>
                        <button class="cron-preset" data-expr="0 * * * *">Hourly</button>
                        <button class="cron-preset" data-expr="0 4 * * 1">Weekly Mon</button>
                        <button class="cron-preset" data-expr="manual">Manual only</button>
                    </div>
                    <div id="cron-preview"></div>
                    <button id="cron-save-btn" class="btn-primary">Save Schedule</button>
                </div>
            </section>
        </aside>
        <div id="sidebar-backdrop"></div>

        <!-- Main content -->
        <main id="main">
            <div id="toolbar">
                <div id="toolbar-primary">
                    <button id="sidebar-toggle" title="Toggle sidebar">☰</button>
                    <div id="search-wrap">
                        <input type="text" id="search-input" placeholder="Search channels..." />
                        <button id="search-clear" title="Clear">&#x2715;</button>
                    </div>
                    <span id="channel-count"></span>
                    <button id="theme-toggle" class="icon-btn" title="Toggle light / dark mode">🌙</button>
                    <button id="save-btn" class="btn-primary" disabled>Save Changes</button>
                </div>
                <div id="toolbar-secondary">
                    <button id="add-group-btn" class="btn-secondary">＋ New Group</button>
                    <button id="layout-btn" class="btn-secondary" title="Toggle 1 / 2 column layout">⬜ 1 Column</button>
                    <button id="download-m3u-btn" class="btn-secondary" title="Download modified M3U playlist">⬇
                        Download M3U</button>
                    <button id="export-btn" class="btn-secondary" title="Export all settings to a JSON file">⬇
                        Export</button>
                    <button id="import-btn" class="btn-secondary" title="Import settings from a JSON file">⬆
                        Import</button>
                    <input type="file" id="import-input" accept=".json,application/json" style="display:none;" />
                    <button id="reset-btn" class="btn-danger">Reset Everything</button>
                </div>
            </div>

            <div id="content-area">
                <div id="empty-state">
                    <div class="empty-icon">📋</div>
                    <p>No channels yet. Fetch a source URL or paste an M3U list.</p>
                </div>
                <div id="dual-pane">
                    <div id="pane-a-wrap">
                        <div id="pane-a-toolbar" class="hidden">
                            <button id="expand-all-btn" class="btn-secondary btn-sm" title="Expand all groups">⊞ Expand
                                all</button>
                            <button id="collapse-all-btn" class="btn-secondary btn-sm" title="Collapse all groups">⊟
                                Collapse all</button>
                        </div>
                        <div id="groups-container"></div>
                    </div>
                    <div id="pane-b-wrap" class="pane-b">
                        <div id="pane-b-toolbar" class="hidden">
                            <button id="expand-all-btn-b" class="btn-secondary btn-sm" title="Expand all groups">⊞
                                Expand all</button>
                            <button id="collapse-all-btn-b" class="btn-secondary btn-sm" title="Collapse all groups">⊟
                                Collapse all</button>
                        </div>
                        <div id="groups-container-b"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script src="app.js"></script>
</body>

</html>
